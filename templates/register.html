{% extends "base.html" %}
{% block title %}Create Account - Expense Tracker Pro{% endblock %}

{% block content %}
<div class="auth-wrapper glass-panel">
    <h2 class="auth-title"><i class="fa-solid fa-user-plus"></i> Get Started</h2>
    <p style="text-align: center; margin-bottom: 2rem;">Create your account to start managing expenses smarter.</p>
    
    <form action="{{ url_for('auth.register') }}" method="POST">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username (min 3 chars)" required autofocus>
        </div>
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="yourname@domain.com" required>
        </div>
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Choose a secure password (min 6 chars)" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            <i class="fa-solid fa-circle-check"></i> Register Account
        </button>
    </form>
    
    <div class="auth-footer">
        <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login instead</a></p>
    </div>
</div>
{% endblock %}
