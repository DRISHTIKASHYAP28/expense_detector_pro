{% extends "base.html" %}
{% block title %}Page Not Found - Expense Tracker Pro{% endblock %}

{% block content %}
<div class="glass-panel" style="max-width: 550px; margin: 4rem auto; text-align: center; padding: 4rem 2rem;">
    <h1 style="font-size: 6rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1;">404</h1>
    <h2 style="margin-top: 1rem; margin-bottom: 1rem;">Page Not Found</h2>
    <p style="margin-bottom: 2.5rem; color: var(--text-muted);">The requested page could not be located. It might have been moved, deleted, or never existed.</p>
    
    <a href="/" class="btn btn-primary">
        <i class="fa-solid fa-house"></i> Return to Safety
    </a>
</div>
{% endblock %}
