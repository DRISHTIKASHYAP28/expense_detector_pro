{% extends "base.html" %}
{% block title %}Sign In - Expense Tracker Pro{% endblock %}

{% block content %}
<div class="auth-wrapper glass-panel">
    <h2 class="auth-title"><i class="fa-solid fa-shield-halved"></i> Sign In</h2>
    <p style="text-align: center; margin-bottom: 2rem;">Access your dashboard and track your expenses.</p>
    
    <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="form-group">
            <label for="email_or_username" class="form-label">Username or Email</label>
            <input type="text" id="email_or_username" name="email_or_username" class="form-control" placeholder="Enter your credentials" required autofocus>
        </div>
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
        </button>
    </form>
    
    <div class="auth-footer">
        <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up here</a></p>
    </div>
</div>
{% endblock %}
